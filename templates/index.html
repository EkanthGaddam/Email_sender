<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>MindCloudz Mailer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .header {
            background-color: antiquewhite;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            margin: 40px auto;
            width: 400px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            margin-left: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            width: 100%;
            background-color: #2196F3;
        }
    </style>
</head>

<body>
      {% include 'message.html' %}

    <!-- Header -->
    <div class="header">
        <h3>MindCloudz Mailer</h3>
    </div>

    <!-- Form Container -->
    <div class="container">
      

        <form action="/upload_excel" method="post" enctype="multipart/form-data">

            <!-- Excel File Input -->
            <label>Excel File</label>
            <div class="input-group">
                <input type="text" id="filePath" value="{{file}}" placeholder="Choose Excel file..." readonly>

                <button type="button" onclick="document.getElementById('fileInput').click()">
                    Browse
                </button>
            </div>

            <input type="file" id="fileInput" name="file" accept=".xlsx, .xls"
                   class="file-input" onchange="updateExcelName(this)">


            <!-- Template File -->
            <!-- <label>HTML Template</label>
            <input type="file" name="template_file" accept=".html"> -->
            <div class="input-group">
                <input type="text" id="template_filePath" placeholder="Choose template.." readonly>

                <button type="button" onclick="document.getElementById('template_fileInput').click()">
                    Browse
                </button>
            </div>
            <input type="file" id="template_fileInput" name="template_file" accept=".html"
            class="file-input" onchange="updateTemplatePath(this)">


            <br><br>

            <!-- Submit -->
            <button type="submit" class="upload-btn">Send</button>

        </form>

    </div>

    <!-- JavaScript -->
    <script>
        function updateExcelName(input) {
            const filePathInput = document.getElementById('filePath');

            if (input.files.length > 0) {
                filePathInput.value = input.files[0].name;
            }
        }
    </script>

        <script>
        function updateTemplatePath(input) {
            const filePathInput = document.getElementById('template_filePath');

            if (input.files.length > 0) {
                filePathInput.value = input.files[0].name;
            }
        }
    </script>


</body>
</html>
